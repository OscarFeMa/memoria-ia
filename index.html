<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafo de Conocimiento — Pensamiento Coral</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #050a0e;
    --surface: #0a141d;
    --primary: #00f2ff;
    --secondary: #7000ff;
    --text: #e0f2f1;
    --text-dim: #94a3b8;
    --accent: #ff007a;
  }

  body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    overflow: hidden;
  }

  canvas { display: block; cursor: grab; }
  canvas:active { cursor: grabbing; }

  /* Interfaz superior */
  #ui-top {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 1.5rem;
    background: linear-gradient(to bottom, rgba(5,10,14,0.95), transparent);
    z-index: 10;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none;
  }
  .title-group { pointer-events: auto; }
  h1 { margin: 0; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; text-transform: uppercase; color: var(--primary); }
  .status { font-size: 0.7rem; opacity: 0.7; display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #00ff00; box-shadow: 0 0 10px #00ff00; }

  /* Sidebar */
  #sidebar {
    position: absolute; right: -400px; top: 0; bottom: 0;
    width: 350px; background: rgba(10,20,29,0.95);
    border-left: 1px solid rgba(0,242,255,0.2);
    backdrop-filter: blur(20px);
    z-index: 100; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    padding: 2rem; overflow-y: auto;
  }
  #sidebar.open { right: 0; }
  .close-btn { position: absolute; top: 1rem; right: 1rem; cursor: pointer; color: var(--primary); font-size: 1.2rem; background: none; border: none; }
  .node-type { font-size: 0.7rem; text-transform: uppercase; color: var(--accent); letter-spacing: 2px; margin-bottom: 0.5rem; }
  .node-title { font-family: 'Syne', sans-serif; font-size: 1.8rem; line-height: 1.1; margin-bottom: 1.5rem; color: var(--text); }
  .node-meta { font-size: 0.8rem; color: var(--text-dim); border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem; margin-top: 1rem; }
  .node-content { font-size: 0.95rem; line-height: 1.6; color: #cbd5e1; }

  #loader {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    justify-content: center; align-items: center; z-index: 1000; background: var(--bg);
  }
  .loading-bar { width: 200px; height: 2px; background: rgba(0,242,255,0.1); margin-top: 1rem; overflow: hidden; }
  .loading-progress { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }
</style>
</head>
<body>

<div id="loader">
  <div style="font-family: 'Syne', sans-serif; font-weight: 800; color: var(--primary);">CONECTANDO A MEMORIA CORAL...</div>
  <div class="loading-bar"><div id="progress" class="loading-progress"></div></div>
</div>

<div id="ui-top">
  <div class="title-group">
    <h1>Pensamiento Coral</h1>
    <div class="status"><span class="dot" id="status-dot"></span> <span id="status-text">Sincronizado con Supabase (memory_entries)</span></div>
  </div>
</div>

<aside id="sidebar">
  <button class="close-btn" onclick="closeSidebar()">×</button>
  <div id="sb-type" class="node-type">---</div>
  <h2 id="sb-title" class="node-title">Selecciona un nodo</h2>
  <div id="sb-content" class="node-content">Haz clic en un pensamiento para explorar su conexión...</div>
  <div id="sb-meta" class="node-meta"></div>
</aside>

<canvas id="canvas"></canvas>

<script>
/**
 * CONFIGURACIÓN DE SUPABASE
 * Sustituye estos valores con los de tu proyecto
 */
const SUPABASE_URL = 'https://jdbzjapshomatwyasmig.supabase.co'; 
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkYnpqYXBzaG9tYXR3eWFzbWlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4ODAzNzMsImV4cCI6MjA3OTQ1NjM3M30.AmHDH1dmJ3qme8VYN1EU3zjf7zZAKESal5NXWhX-KMk';
// URL para acceder directamente a la tabla memory_entries
const API_URL = `${SUPABASE_URL}/rest/v1/memory_entries?select=*`;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let width, height;
let nodes = [], links = [];
let camX = 0, camY = 0, camScale = 1;
let selectedNode = null;
let hoveredNode = null;

// --- CARGA DE DATOS ---

async function loadData() {
    const progress = document.getElementById('progress');
    try {
        progress.style.width = '30%';
        
        const response = await fetch(API_URL, {
            method: 'GET',
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Content-Type': 'application/json'
            }
        });

        if (!response.ok) {
            const errJson = await response.json();
            throw new Error(errJson.message || `Error HTTP ${response.status}`);
        }

        const rawData = await response.json();
        progress.style.width = '70%';

        // TRANSFORMACIÓN: Adaptamos tus campos de memory_entries a lo que el grafo necesita
        nodes = rawData.map((item, index) => ({
            id: item.id || index,
            label: item.field_key || "Sin título",   // Usamos field_key como nombre del nodo
            content: item.field_value || "",         // Usamos field_value como el texto
            type: item.entry_type || "insight",
            author: item.ia_author || "desconocido",
            score: item.confidence_score || 1,
            // Posición inicial aleatoria
            x: (Math.random() - 0.5) * 1000,
            y: (Math.random() - 0.5) * 1000,
            vx: 0, vy: 0
        }));

        // Generar enlaces automáticos por tipo o autor (si no tienes tabla de links)
        nodes.forEach((n, i) => {
            if (i > 0) {
                // Conectamos cada nodo con el anterior para crear una red básica
                // En el futuro puedes conectar por parent_entry_id si lo usas
                links.push({ source: nodes[i-1], target: n });
            }
        });

        document.getElementById('loader').style.display = 'none';
        initSimulation();

    } catch (err) {
        console.error("Error crítico:", err);
        document.getElementById('status-dot').style.background = 'red';
        document.getElementById('status-text').innerText = "Fallo de conexión: " + err.message;
        alert("Error al conectar con Supabase. Revisa la consola (F12) y tus credenciales.");
    }
}

// --- MOTOR DEL GRAFO (Física simplificada) ---

function initSimulation() {
    resize();
    animate();
}

function animate() {
    ctx.clearRect(0, 0, width, height);
    ctx.save();
    ctx.translate(width/2 + camX, height/2 + camY);
    ctx.scale(camScale, camScale);

    // Física básica de repulsión
    nodes.forEach(n => {
        nodes.forEach(other => {
            if (n === other) return;
            const dx = n.x - other.x;
            const dy = n.y - other.y;
            const dist = Math.sqrt(dx*dx + dy*dy) || 1;
            if (dist < 200) {
                n.vx += dx/dist * 0.5;
                n.vy += dy/dist * 0.5;
            }
        });
        n.vx *= 0.9; n.vy *= 0.9;
        n.x += n.vx; n.y += n.vy;
    });

    // Dibujar enlaces
    ctx.strokeStyle = "rgba(0, 242, 255, 0.1)";
    ctx.beginPath();
    links.forEach(l => {
        ctx.moveTo(l.source.x, l.source.y);
        ctx.lineTo(l.target.x, l.target.y);
    });
    ctx.stroke();

    // Dibujar nodos
    nodes.forEach(n => {
        const isHovered = n === hoveredNode || n === selectedNode;
        ctx.fillStyle = isHovered ? varColor('--primary') : varColor('--secondary');
        ctx.beginPath();
        ctx.arc(n.x, n.y, isHovered ? 8 : 4, 0, Math.PI*2);
        ctx.fill();

        if (isHovered || camScale > 0.8) {
            ctx.fillStyle = "white";
            ctx.font = "10px 'Space Mono'";
            ctx.fillText(n.label, n.x + 12, n.y + 4);
        }
    });

    ctx.restore();
    requestAnimationFrame(animate);
}

// --- INTERACCIÓN ---

function varColor(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * window.devicePixelRatio;
    canvas.height = height * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}

function openSidebar(n) {
    document.getElementById('sb-type').innerText = n.type;
    document.getElementById('sb-title').innerText = n.label;
    document.getElementById('sb-content').innerText = n.content;
    document.getElementById('sb-meta').innerHTML = `
        Autor: ${n.author.toUpperCase()}<br>
        Confianza: ${(n.score * 100).toFixed(1)}%<br>
        ID: ${n.id.toString().substring(0,8)}...
    `;
    document.getElementById('sidebar').classList.add('open');
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    selectedNode = null;
}

canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left - width/2 - camX) / camScale;
    const my = (e.clientY - rect.top - height/2 - camY) / camScale;
    
    selectedNode = nodes.find(n => Math.hypot(n.x - mx, n.y - my) < 20);
    if (selectedNode) openSidebar(selectedNode);
    else closeSidebar();
});

window.addEventListener('resize', resize);
loadData();

</script>
</body>
</html>
