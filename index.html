<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafo de Conocimiento — Pensamiento Coral</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #050a0e;
    --surface: #0a141d;
    --primary: #00f2ff;
    --secondary: #7000ff;
    --text: #e0f2f1;
    --text-dim: #94a3b8;
    --accent: #ff007a;
  }

  body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    overflow: hidden;
  }

  canvas { display: block; cursor: grab; }
  canvas:active { cursor: grabbing; }

  /* UI CABECERA */
  #ui-top {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 1.5rem;
    background: linear-gradient(to bottom, rgba(5,10,14,0.95), transparent);
    z-index: 10;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none;
  }
  .title-group { 
    pointer-events: auto; 
    display: flex; 
    flex-direction: column; 
    gap: 6px;
  }
  .header-main {
    display: flex;
    align-items: center;
    gap: 15px;
  }
  h1 { margin: 0; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; letter-spacing: -1px; text-transform: uppercase; color: var(--primary); }
  
  #entry-counter {
    font-size: 0.7rem;
    font-weight: bold;
    color: var(--primary);
    border: 1px solid rgba(0, 242, 255, 0.4);
    padding: 2px 10px;
    border-radius: 4px;
    background: rgba(0, 242, 255, 0.1);
    letter-spacing: 1px;
  }

  .status { font-size: 0.65rem; opacity: 0.7; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #00ff00; box-shadow: 0 0 10px #00ff00; }

  /* SIDEBAR */
  #sidebar {
    position: absolute; right: -400px; top: 0; bottom: 0;
    width: 350px; background: rgba(10,20,29,0.95);
    border-left: 1px solid rgba(0,242,255,0.2);
    backdrop-filter: blur(20px);
    z-index: 100; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    padding: 2.5rem 1.5rem; overflow-y: auto;
  }
  #sidebar.open { right: 0; }
  .close-btn { position: absolute; top: 1rem; right: 1rem; cursor: pointer; color: var(--primary); font-size: 1.5rem; background: none; border: none; }
  .node-type { font-size: 0.7rem; text-transform: uppercase; color: var(--accent); letter-spacing: 2px; margin-bottom: 0.5rem; font-weight: bold; }
  .node-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; line-height: 1.1; margin-bottom: 1.5rem; color: var(--text); font-weight: 800; }
  .node-content { font-size: 0.9rem; line-height: 1.7; color: #cbd5e1; white-space: pre-wrap; }
  .node-meta { font-size: 0.75rem; color: var(--text-dim); border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.5rem; margin-top: 1.5rem; line-height: 1.8; }

  /* LOADER */
  #loader {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    justify-content: center; align-items: center; z-index: 1000; background: var(--bg);
  }
  .loading-bar { width: 200px; height: 2px; background: rgba(0,242,255,0.1); margin-top: 1rem; overflow: hidden; }
  .loading-progress { width: 0%; height: 100%; background: var(--primary); transition: width 0.4s; }
</style>
</head>
<body>

<div id="loader">
  <div style="font-family: 'Syne', sans-serif; font-weight: 800; color: var(--primary); letter-spacing: 2px;">SINCRO: MEMORY_ENTRIES</div>
  <div class="loading-bar"><div id="progress" class="loading-progress"></div></div>
</div>

<div id="ui-top">
  <div class="title-group">
    <div class="header-main">
        <h1>Pensamiento Coral</h1>
        <span id="entry-counter">0 ENTRADAS</span>
    </div>
    <div class="status"><span class="dot" id="status-dot"></span> <span id="status-text">Memoria Persistente Activa</span></div>
  </div>
</div>

<aside id="sidebar">
  <button class="close-btn" onclick="closeSidebar()">×</button>
  <div id="sb-type" class="node-type">---</div>
  <h2 id="sb-title" class="node-title">Selección de Nodo</h2>
  <div id="sb-content" class="node-content">Explora las conexiones del sistema...</div>
  <div id="sb-meta" class="node-meta"></div>
</aside>

<canvas id="canvas"></canvas>

<script>
/**
 * CONFIGURACIÓN DE CONEXIÓN
 */
const SUPABASE_URL = 'https://jdbzjapshomatwyasmig.supabase.co'; 
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkYnpqYXBzaG9tYXR3eWFzbWlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4ODAzNzMsImV4cCI6MjA3OTQ1NjM3M30.AmHDH1dmJ3qme8VYN1EU3zjf7zZAKESal5NXWhX-KMk';

// Consulta directa a la tabla memory_entries ordenando por creación
const API_URL = `${SUPABASE_URL}/rest/v1/memory_entries?select=*&order=created_at.desc`;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let width, height;
let nodes = [], links = [];
let camX = 0, camY = 0;
let camScale = 0.7; 
let selectedNode = null;
let hoveredNode = null;

async function loadData() {
    const progress = document.getElementById('progress');
    try {
        progress.style.width = '30%';
        const response = await fetch(API_URL, {
            method: 'GET',
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Content-Type': 'application/json'
            }
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const rawData = await response.json();
        progress.style.width = '100%';

        // Actualizar contador en la cabecera
        document.getElementById('entry-counter').innerText = `${rawData.length} ENTRADAS`;

        // Procesar los datos de tu tabla memory_entries
        nodes = rawData.map((item, index) => ({
            id: item.id || index,
            label: item.field_key || "Entrada sin título", // Título del nodo
            content: item.field_value || "Sin descripción disponible.", // Texto largo
            type: item.entry_type || "insight",
            author: item.ia_author || "system",
            score: item.confidence_score || 1,
            date: item.created_at,
            // Distribución inicial circular compacta
            x: Math.cos(index) * (index * 15),
            y: Math.sin(index) * (index * 15),
            vx: 0, vy: 0
        }));

        // Crear enlaces visuales entre entradas consecutivas (historia de la memoria)
        for(let i=0; i < nodes.length - 1; i++) {
            links.push({ source: nodes[i], target: nodes[i+1] });
        }

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            initSimulation();
        }, 600);

    } catch (err) {
        console.error("Error en carga:", err);
        document.getElementById('status-dot').style.background = '#ff0055';
        document.getElementById('status-text').innerText = "Error de sincronización";
        alert("No se pudo conectar con memory_entries. Revisa el RLS en Supabase.");
    }
}

function initSimulation() {
    resize();
    animate();
}

function animate() {
    ctx.clearRect(0, 0, width, height);
    ctx.save();
    ctx.translate(width/2 + camX, height/2 + camY);
    ctx.scale(camScale, camScale);

    // Motor físico suave y compacto
    nodes.forEach(n => {
        nodes.forEach(other => {
            if (n === other) return;
            const dx = n.x - other.x;
            const dy = n.y - other.y;
            const dist = Math.sqrt(dx*dx + dy*dy) || 1;
            if (dist < 100) { // Radio de colisión reducido
                n.vx += dx/dist * 0.3;
                n.vy += dy/dist * 0.3;
            }
        });
        // Gravedad central para evitar que los nodos floten al infinito
        n.vx -= n.x * 0.005;
        n.vy -= n.y * 0.005;

        n.vx *= 0.9; n.vy *= 0.9;
        n.x += n.vx; n.y += n.vy;
    });

    // Dibujar Enlaces (Conexiones)
    ctx.strokeStyle = "rgba(0, 242, 255, 0.06)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    links.forEach(l => {
        ctx.moveTo(l.source.x, l.source.y);
        ctx.lineTo(l.target.x, l.target.y);
    });
    ctx.stroke();

    // Dibujar Nodos
    nodes.forEach(n => {
        const isSelected = n === selectedNode;
        const isHovered = n === hoveredNode;
        
        ctx.fillStyle = isSelected ? varColor('--primary') : varColor('--secondary');
        if (isSelected) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = varColor('--primary');
        }
        
        ctx.beginPath();
        ctx.arc(n.x, n.y, isSelected ? 8 : 4, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Etiquetas (solo si hay zoom o está seleccionado)
        if (camScale > 0.4 || isSelected) {
            ctx.fillStyle = isSelected ? "#fff" : "rgba(255,255,255,0.5)";
            ctx.font = `${isSelected ? 'bold' : ''} 10px 'Space Mono'`;
            ctx.fillText(n.label.toUpperCase(), n.x + 12, n.y + 3);
        }
    });

    ctx.restore();
    requestAnimationFrame(animate);
}

function varColor(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * window.devicePixelRatio;
    canvas.height = height * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}

function openSidebar(n) {
    document.getElementById('sb-type').innerText = n.type;
    document.getElementById('sb-title').innerText = n.label;
    document.getElementById('sb-content').innerText = n.content;
    
    const fechaStr = new Date(n.date).toLocaleString('es-ES', { 
        day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' 
    });

    document.getElementById('sb-meta').innerHTML = `
        ORIGEN IA: ${n.author.toUpperCase()}<br>
        CONFIANZA: ${(n.score * 100).toFixed(0)}%<br>
        REGISTRO: ${fechaStr}
    `;
    document.getElementById('sidebar').classList.add('open');
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    selectedNode = null;
}

// Interacción de clic
canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left - width/2 - camX) / camScale;
    const my = (e.clientY - rect.top - height/2 - camY) / camScale;
    
    const clicked = nodes.find(n => Math.hypot(n.x - mx, n.y - my) < 15);
    if (clicked) {
        selectedNode = clicked;
        openSidebar(clicked);
    } else {
        closeSidebar();
    }
});

// Soporte para arrastrar la cámara
let isDragging = false;
let lastMouse = { x: 0, y: 0 };

canvas.addEventListener('mousedown', e => { isDragging = true; lastMouse = { x: e.clientX, y: e.clientY }; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
    if (isDragging) {
        camX += (e.clientX - lastMouse.x);
        camY += (e.clientY - lastMouse.y);
        lastMouse = { x: e.clientX, y: e.clientY };
    }
});

// Zoom con rueda
window.addEventListener('wheel', e => {
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    camScale = Math.max(0.1, Math.min(3, camScale * delta));
}, { passive: true });

window.addEventListener('resize', resize);
loadData();

</script>
</body>
</html>
