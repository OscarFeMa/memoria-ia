<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafo de Conocimiento — Pensamiento Coral (Live Sync)</title>
<script src="https://unpkg.com/force-graph"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@800&display=swap');
  :root { --bg: #050a0e; --accent: #00d4ff; --text: #c8dde8; --border: #1a2d40; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; overflow: hidden; }
  #header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(10,20,32,0.9); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; z-index: 100; backdrop-filter: blur(10px); }
  .logo { font-family: 'Syne'; color: var(--accent); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
  .sync-btn { margin-left: auto; background: rgba(0,212,255,0.1); border: 1px solid var(--accent); color: var(--accent); padding: 8px 16px; cursor: pointer; font-family: 'Space Mono'; font-size: 11px; font-weight: bold; border-radius: 4px; }
  .sync-btn:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 15px var(--accent); }
  #status-bar { position: fixed; bottom: 20px; left: 20px; font-size: 10px; color: #4a6478; z-index: 100; background: rgba(5,10,14,0.8); padding: 5px 10px; border-radius: 4px; }
</style>
</head>
<body>
<div id="header">
  <div class="logo">🌊 Pensamiento Coral</div>
  <div style="margin-left:20px; font-size:11px; opacity:0.6;">NODOS: <span id="count">---</span></div>
  <button class="sync-btn" onclick="runSync()">⟳ ACTUALIZAR GRAFO</button>
</div>
<div id="status-bar">INICIALIZANDO...</div>
<div id="graph-container"></div>
<script>
  const API_URL = "https://jdbzjapshomatwyasmig.supabase.co/functions/v1/memory-export-graph";
  const statusEl = document.getElementById('status-bar');
  const countEl = document.getElementById('count');

  const Graph = ForceGraph()(document.getElementById('graph-container'))
    .nodeId('id')
    .nodeLabel('field_key')
    .nodeAutoColorBy('ia_author')
    .linkDirectionalParticles(2)
    .backgroundColor('#050a0e');

  async function runSync() {
    statusEl.innerText = "⟳ CONECTANDO CON SUPABASE...";
    statusEl.style.color = "#00d4ff";
    try {
      const response = await fetch(API_URL);
      if (!response.ok) throw new Error('Error de conexión');
      const data = await response.json();
      if (data.nodes) {
        Graph.graphData(data);
        countEl.innerText = data.nodes.length;
        statusEl.innerText = "✓ " + data.nodes.length + " NODOS SINCRONIZADOS CORRECTAMENTE";
        statusEl.style.color = "#4ade80";
      }
    } catch (err) {
      statusEl.innerText = "✗ ERROR: " + err.message;
      statusEl.style.color = "#f87171";
    }
  }
  runSync(); // Carga automática al abrir
</script>
</body>
</html>
